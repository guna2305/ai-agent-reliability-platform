version: "3.9"

services:
  db_test:
    image: postgres:16-alpine
    container_name: agent_reliability_db_test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: agent_reliability_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agent_reliability_test"]
      interval: 3s
      timeout: 3s
      retries: 10

  test:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: agent_reliability_test
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@db_test:5432/agent_reliability_test
      DATABASE_URL_SYNC: postgresql://postgres:postgres@db_test:5432/agent_reliability_test
      APP_ENV: development
    command: pytest tests/ -v --cov=src --cov-report=term-missing
    depends_on:
      db_test:
        condition: service_healthy
