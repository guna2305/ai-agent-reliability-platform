# Production-leaning overrides. Secrets MUST be supplied at install time, e.g.:
#   helm install ... -f values-prod.yaml \
#     --set-string secrets.secretKey="$(openssl rand -hex 32)" \
#     --set-string secrets.postgresPassword="$STRONG_PASSWORD"
config:
  appEnv: production
  logLevel: INFO
  otelEnabled: "true"

api:
  replicas: 3
  resources:
    requests: { cpu: 500m, memory: 512Mi }
    limits:   { cpu: "1", memory: 1Gi }

workers:
  evaluations:
    replicas: 2
    concurrency: 4
  analytics:
    replicas: 1
    concurrency: 2

frontend:
  replicas: 2

postgres:
  storage: 20Gi
  resources:
    requests: { cpu: "1", memory: 1Gi }
    limits:   { cpu: "2", memory: 2Gi }

ollama:
  storage: 50Gi
  resources:
    requests: { cpu: "2", memory: 6Gi }
    limits:   { cpu: "4", memory: 12Gi }
