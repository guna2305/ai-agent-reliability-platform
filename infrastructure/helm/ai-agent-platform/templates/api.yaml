apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: {{ include "platform.namespace" . }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
    app: api
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
        - name: api
          image: {{ .Values.api.image }}
          imagePullPolicy: {{ .Values.global.imagePullPolicy }}
          command: ["uvicorn", "src.presentation.main:app", "--host", "0.0.0.0", "--port", "{{ .Values.api.port }}"]
          ports:
            - containerPort: {{ .Values.api.port }}
          envFrom:
            - configMapRef: { name: platform-config }
            - secretRef: { name: platform-secrets }
          readinessProbe:
            httpGet: { path: /api/v1/health, port: {{ .Values.api.port }} }
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /api/v1/health, port: {{ .Values.api.port }} }
            initialDelaySeconds: 30
            periodSeconds: 30
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: {{ include "platform.namespace" . }}
  labels:
    {{- include "platform.labels" . | nindent 4 }}
spec:
  selector:
    app: api
  ports:
    - port: {{ .Values.api.port }}
      targetPort: {{ .Values.api.port }}
