# Minikube: enable with `minikube addons enable ingress`
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: agent-platform-ingress
  namespace: agent-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: agent-platform.local  # Add to /etc/hosts: $(minikube ip) agent-platform.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: agent-platform-api-service
                port:
                  number: 8000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: agent-platform-frontend-service
                port:
                  number: 80
