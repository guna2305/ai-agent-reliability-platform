# NEVER commit real secrets. Use `kubectl create secret` or sealed-secrets.
# This is a template showing the required keys.
#
# Create manually:
#   kubectl create secret generic agent-platform-secrets \
#     --namespace=agent-platform \
#     --from-literal=SECRET_KEY=$(openssl rand -hex 32) \
#     --from-literal=DATABASE_URL="postgresql+asyncpg://..." \
#     --from-literal=DATABASE_URL_SYNC="postgresql://..." \
#     --from-literal=REDIS_URL="redis://redis-service:6379/0" \
#     --from-literal=CELERY_BROKER_URL="redis://redis-service:6379/1" \
#     --from-literal=CELERY_RESULT_BACKEND="redis://redis-service:6379/2"
apiVersion: v1
kind: Secret
metadata:
  name: agent-platform-secrets
  namespace: agent-platform
type: Opaque
stringData:
  SECRET_KEY: "REPLACE_ME"
  DATABASE_URL: "REPLACE_ME"
  DATABASE_URL_SYNC: "REPLACE_ME"
  REDIS_URL: "redis://redis-service:6379/0"
  CELERY_BROKER_URL: "redis://redis-service:6379/1"
  CELERY_RESULT_BACKEND: "redis://redis-service:6379/2"
