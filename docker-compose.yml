version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# AI Agent Evaluation & Reliability Platform — Development Stack
# ─────────────────────────────────────────────────────────────────────────────

x-backend-env: &backend-env
  DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent_reliability}
  DATABASE_URL_SYNC: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@db:5432/${POSTGRES_DB:-agent_reliability}
  REDIS_URL: redis://redis:6379/0
  CELERY_BROKER_URL: redis://redis:6379/1
  CELERY_RESULT_BACKEND: redis://redis:6379/2
  APP_ENV: development
  # Ollama — default AI provider (free, local)
  OLLAMA_BASE_URL: http://ollama:11434
  DEFAULT_PROVIDER: ollama
  DEFAULT_MODEL: llama3.2
  EVAL_JUDGE_MODEL: llama3.2

services:
  # ── PostgreSQL (with pgvector extension) ────────────────────────────────────
  db:
    image: pgvector/pgvector:pg16
    container_name: agent_platform_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-agent_reliability}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infrastructure/docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-agent_reliability}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis ────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: agent_platform_redis
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── FastAPI Backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: agent_platform_api
    env_file: .env
    environment:
      <<: *backend-env
    volumes:
      - .:/app
      - /app/ai_agent_reliability_platform.egg-info
    ports:
      - "${APP_PORT:-8000}:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Celery Worker: Evaluations ───────────────────────────────────────────────
  worker-evaluations:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: agent_platform_worker_eval
    command: >
      celery -A src.infrastructure.queue.celery_app.celery_app worker
      --queues=evaluations,critical
      --concurrency=4
      --loglevel=info
      --hostname=worker-eval@%h
    env_file: .env
    environment:
      <<: *backend-env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Worker: Analytics ─────────────────────────────────────────────────
  worker-analytics:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: agent_platform_worker_analytics
    command: >
      celery -A src.infrastructure.queue.celery_app.celery_app worker
      --queues=analytics
      --concurrency=2
      --loglevel=info
      --hostname=worker-analytics@%h
    env_file: .env
    environment:
      <<: *backend-env
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  # ── Celery Flower (task monitoring) ─────────────────────────────────────────
  flower:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: agent_platform_flower
    command: >
      celery -A src.infrastructure.queue.celery_app.celery_app flower
      --port=5555
    environment:
      <<: *backend-env
    ports:
      - "5555:5555"
    depends_on:
      - redis

  # ── Ollama (local LLM — free, no API keys needed) ───────────────────────────
  ollama:
    image: ollama/ollama:latest
    container_name: agent_platform_ollama
    volumes:
      - ollama_data:/root/.ollama
    ports:
      - "11434:11434"
    # GPU support (uncomment if you have NVIDIA GPU + nvidia-container-toolkit):
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]

  # ── React Frontend ───────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: agent_platform_frontend
    environment:
      VITE_API_URL: http://localhost:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

  # ── Database Migrations ──────────────────────────────────────────────────────
  migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: development
    container_name: agent_platform_migrate
    command: alembic upgrade head
    env_file: .env
    environment:
      <<: *backend-env
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - migration

  # ── Prometheus ───────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.52.0
    container_name: agent_platform_prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=15d
    volumes:
      - ./infrastructure/monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    profiles:
      - monitoring

  # ── Grafana ──────────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.4.3
    container_name: agent_platform_grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /etc/grafana/dashboards/overview.json
    volumes:
      - grafana_data:/var/lib/grafana
      - ./infrastructure/monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    profiles:
      - monitoring

volumes:
  postgres_data:
  redis_data:
  ollama_data:
  prometheus_data:
  grafana_data:
