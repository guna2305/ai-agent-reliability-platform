name: CD — Deploy to Azure

on:
  push:
    branches: [main]
    tags: ['v*']

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    environment: production
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - name: Log in to Azure Container Registry
        uses: azure/docker-login@v1
        with:
          login-server: ${{ secrets.ACR_LOGIN_SERVER }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push backend
        run: |
          docker build -f docker/Dockerfile --target production \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/agent-platform-api:${{ github.ref_name }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/agent-platform-api:latest .
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/agent-platform-api:${{ github.ref_name }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/agent-platform-api:latest

      - name: Build and push frontend
        run: |
          docker build -f frontend/Dockerfile --target production \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/agent-platform-frontend:${{ github.ref_name }} \
            -t ${{ secrets.ACR_LOGIN_SERVER }}/agent-platform-frontend:latest frontend/
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/agent-platform-frontend:${{ github.ref_name }}
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/agent-platform-frontend:latest

      - name: Deploy to AKS
        uses: azure/k8s-deploy@v4
        with:
          namespace: production
          manifests: infrastructure/kubernetes/overlays/prod
          images: |
            ${{ secrets.ACR_LOGIN_SERVER }}/agent-platform-api:${{ github.ref_name }}
            ${{ secrets.ACR_LOGIN_SERVER }}/agent-platform-frontend:${{ github.ref_name }}
