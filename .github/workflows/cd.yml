name: Helm Chart Validation

# This is a local-first project deployed to Minikube — there is no managed
# cloud cluster. Instead of a fictional cloud deploy, validate the Helm chart
# (lint + render) so the manifests stay correct.

on:
  push:
    branches: [main]
    paths:
      - 'infrastructure/helm/**'
  pull_request:
    paths:
      - 'infrastructure/helm/**'

jobs:
  helm-validate:
    name: Helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.2

      - name: Lint chart
        run: helm lint infrastructure/helm/ai-agent-platform

      - name: Render default values
        run: helm template platform infrastructure/helm/ai-agent-platform > /tmp/default.yaml

      - name: Render dev values
        run: helm template platform infrastructure/helm/ai-agent-platform -f infrastructure/helm/ai-agent-platform/values-dev.yaml > /tmp/dev.yaml

      - name: Render prod values
        run: helm template platform infrastructure/helm/ai-agent-platform -f infrastructure/helm/ai-agent-platform/values-prod.yaml > /tmp/prod.yaml

      - name: Validate rendered manifests (kubeconform)
        uses: docker://ghcr.io/yannh/kubeconform:latest
        with:
          args: "-strict -ignore-missing-schemas -summary /tmp/default.yaml"
        continue-on-error: true
